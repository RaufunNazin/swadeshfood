name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and Update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deployer # Updated from root to deployer
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            export PATH=$PATH:/usr/local/bin:/usr/bin
            export npm_config_cache=/home/deployer/.npm

            cd /root/swadeshfood || exit 1

            # 1. Force Sync to match GitHub main
            git fetch origin
            git reset --hard origin/main

            # 2. Backend Update
            cd backend
            /root/swadeshfood/backend/venv/bin/pip install -r requirements.txt
            sudo /usr/bin/systemctl restart swadesh.service

            # 3. Frontend Update
            cd ../frontend
            npm install
            npm run build

            # 4. Deploy files (Separated to match sudoers exactly)
            sudo /usr/bin/rm -rf /var/www/swadeshfood/*
            sudo /usr/bin/cp -r /root/swadeshfood/frontend/dist/* /var/www/swadeshfood/
            sudo /usr/sbin/restorecon -Rv /var/www/swadeshfood

            echo "Secure deployment successful!"
