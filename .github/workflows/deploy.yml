name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and Update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deployer # Updated from root to deployer
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Set path explicitly
            export PATH=$PATH:/usr/local/bin:/usr/bin
            
            # Navigate to project
            cd /root/swadeshfood || exit 1
            
            # Sync with GitHub
            git pull origin main
            
            # Backend Update
            cd backend
            /root/swadeshfood/backend/venv/bin/pip install -r requirements.txt
            sudo /usr/bin/systemctl restart swadesh.service
            
            # Frontend Update
            cd ../frontend
            npm install
            npm run build
            
            # Deploy files using the specific sudo commands we allowed
            sudo -n /usr/bin/cp -r /root/swadeshfood/frontend/dist /var/www/swadeshfood/
            sudo -n /usr/sbin/restorecon -Rv /var/www/swadeshfood
            
            echo "Secure deployment successful!"
